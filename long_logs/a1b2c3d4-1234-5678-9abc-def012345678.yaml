arc:
  opening_intent: >
    Diagnose intermittent 503s from the rate limiter that surfaced under burst load in staging.
  actual_trajectory: >
    Reproduced the race within the first two turns; chose per-key lock over CAS; landed a regression test that pins the fix.
  closure_status: resolved
