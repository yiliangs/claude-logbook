exchanges:
  - topic: reproduction of the 503 race
    type: debugging
    outcome: resolved
    linked_to: artifact
    core_insight: >
      Two concurrent requests on the same key entered refill_tokens() between the read and write of bucket state — the second write clobbered the first refill, leaving the bucket empty.
  - topic: lock vs CAS choice for the fix
    type: decision
    outcome: resolved
    linked_to: decision
    core_insight: >
      Per-key lock chosen because contention is bounded by tier count (~50) and refill is microsecond-scale; CAS retry loop would add complexity for negligible throughput gain.
  - topic: regression test
    type: design
    outcome: resolved
    linked_to: artifact
    core_insight: >
      200-concurrent-request test against one key reproduces the bug on main and passes on the fix — the test is the gate.

decisions:
  - statement: >
      Use a per-key lock around refill_tokens() rather than CAS-style atomic refill.
    rationale: >
      Contention bounded by tier count; lock hold time is microseconds; simpler code path than retry loops.

